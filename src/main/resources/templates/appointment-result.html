<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號成功 - MiniClinic</title>
</head>
<body>
    <h1>掛號成功！</h1>
    <p>您的掛號資訊已成功存入系統：</p>
    
    <ul>
        <li><strong>掛號編號：</strong> <span th:text="${appt.apptId}"></span></li>
        <li><strong>病歷號：</strong> <span th:text="${appt.patient.chartNo}"></span></li>
        <li><strong>病患姓名：</strong> <span th:text="${appt.patient.name}"></span></li>
        <li><strong>看診醫師：</strong> <span th:text="${appt.doctor.name}"></span> (<span th:text="${appt.doctor.department}"></span>)</li>
        <li><strong>看診日期：</strong> <span th:text="${appt.apptDate}"></span></li>
        <li><strong>看診時段：</strong> <span th:text="${appt.timeSlot}"></span></li>
    </ul>

    <br>
    <a href="/appointment/new">返回繼續掛號</a> | 
    <a href="/appointments">查看所有掛號紀錄</a>
</body>
</html>
