<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>醫師團隊 - MiniClinic</title>
</head>
<body>
    <h1>MiniClinic 醫療團隊</h1>

    <form action="/doctors" method="get">
        <label>依科別篩選：</label>
        <select name="department" onchange="this.form.submit()">
            <option value="">全部科別</option>
            <option th:each="dept : ${departments}" 
                    th:value="${dept}" 
                    th:text="${dept}"
                    th:selected="${dept == selectedDept}"></option>
        </select>
    </form>
    <br>

    <ul>
        <li th:each="doc : ${doctors}">
            <a th:href="@{/doctors/{id}(id=${doc.doctorId})}" th:text="${doc.name}"></a> 
            - <span th:text="${doc.department}"></span>
        </li>
    </ul>

<br>
    <a href="/appointment/new">前往掛號</a> | 
    <a href="/appointments">查看掛號紀錄</a> | 
    <a th:href="@{/login}" style="color: #28a745; font-weight: bold;">[ 醫師後台登入 ]</a>
</body>
</html>
